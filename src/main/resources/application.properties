# ============================================================
# CodeSprint Application Configuration
# ============================================================

# Application name
spring.application.name=codesprint
spring.application.title=CodeSprint Task Manager

# ============================================================
# H2 Database Configuration
# ============================================================
# H2 is an embedded database ideal for development and testing

# Database URL (in-memory database)
spring.datasource.url=jdbc:h2:mem:codesprintdb

# H2 Driver
spring.datasource.driverClassName=org.h2.Driver

# Database credentials (default H2 credentials)
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA/Hibernate Configuration
# ============================================================

# Specify H2 dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate DDL Auto Strategy
# update: Create table if not exists, update if schema changed
# Other options: create, create-drop, validate, none
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (useful for learning and debugging)
spring.jpa.show-sql=true

# Format SQL queries for better readability
spring.jpa.properties.hibernate.format_sql=true

# Show bind parameters in SQL queries
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================================
# H2 Console Configuration
# ============================================================

# Access H2 Console at: http://localhost:8080/h2-console

# Enable H2 Console
spring.h2.console.enabled=true

# Path to access H2 Console
spring.h2.console.path=/h2-console

# Allow H2 access in Docker
spring.h2.console.settings.web-allow-others=true

# ============================================================
# Server Configuration
# ============================================================

# Default server port
server.port=8080

# ============================================================
# Logging Configuration
# ============================================================

# Set logging level for Hibernate SQL (optional)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE